<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HubGrab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      background: #ff6b35;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 17px; font-weight: 700; }
    .header small { font-size: 11px; opacity: 0.8; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .site-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      background: #2a2a4a;
      border: 1px solid #555;
    }
    .site-badge.hf  { border-color: #ff6b35; color: #ff9a6b; }
    .site-badge.suno { border-color: #a78bfa; color: #c4b5fd; }
    .site-badge.none { border-color: #555; color: #888; }
    .status { font-size: 13px; line-height: 1.5; color: #bbb; }
    .status strong { color: #e0e0e0; }
    .btn {
      display: block;
      width: 100%;
      padding: 9px;
      background: #ff6b35;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn:hover { background: #e55a25; }
    .btn.secondary { background: #2a2a4a; border: 1px solid #555; color: #ccc; }
    .btn.secondary:hover { background: #3a3a5a; }
    .footer { font-size: 10px; color: #555; text-align: center; padding-bottom: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🔥 HubGrab</h1>
      <small>Multi-site bulk downloader</small>
    </div>
  </div>
  <div class="body">
    <div>
      <span id="site-badge" class="site-badge none">Detecting...</span>
    </div>
    <div id="status" class="status">Loading...</div>
    <button id="main-btn" class="btn" style="display:none"></button>
    <button id="secondary-btn" class="btn secondary" style="display:none"></button>
  </div>
  <div class="footer">v0.1.0 · HubGrab</div>
  <script src="popup.js"></script>
</body>
</html>
